groups:
  - name: logmonitor-core
    rules:
      - alert: FlaskAppDown
        expr: up{job="flask_app"} == 0
        for: 1m
        labels:
          severity: critical
          component: flask-app
        annotations:
          summary: "Flask app down"
          description: "Prometheus can no longer scrape the flask-app service."

      - alert: HighAlertRate
        expr: sum(increase(logmonitor_alerts_total[10m])) > 25
        for: 5m
        labels:
          severity: warning
          component: detection
        annotations:
          summary: "High alert rate"
          description: "More than 25 alerts were generated in the last 10 minutes."

      - alert: NoLogsProcessed
        expr: increase(logmonitor_logs_processed_total[15m]) == 0
        for: 10m
        labels:
          severity: warning
          component: ingestion
        annotations:
          summary: "No logs processed"
          description: "The total number of processed logs did not increase in the last 15 minutes."

      - alert: MLModelF1Low
        expr: logmonitor_ml_model_f1_score > 0 and logmonitor_ml_model_f1_score < 0.75
        for: 5m
        labels:
          severity: warning
          component: ml
        annotations:
          summary: "ML F1 below target"
          description: "The operational F1 metric is below the 0.75 target."

      - alert: DataFreshnessHigh
        expr: logmonitor_data_freshness_seconds > 300
        for: 10m
        labels:
          severity: warning
          component: data
        annotations:
          summary: "Data freshness degraded"
          description: "The latest log timestamp is more than 5 minutes behind."
