global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: "logmonitor-dev"
    environment: "development"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: flask_app
    static_configs:
      - targets: ["flask-app:5001"]
    metrics_path: /metrics
    scrape_interval: 15s
