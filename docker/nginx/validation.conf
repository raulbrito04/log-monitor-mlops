map $http_x_forwarded_for $logmonitor_client_ip {
    default $http_x_forwarded_for;
    ""      $remote_addr;
}

log_format logmonitor_combined '$logmonitor_client_ip - $remote_user [$time_local] '
                               '"$request" $status $body_bytes_sent '
                               '"$http_referer" "$http_user_agent" $request_time';

server {
    listen 8080;
    access_log /tmp/validation_access.log logmonitor_combined;
    error_log /tmp/validation_error.log warn;

    location / {
        proxy_pass http://flask-app:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}