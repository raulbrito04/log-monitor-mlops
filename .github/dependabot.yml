version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "Europe/Lisbon"
    open-pull-requests-limit: 5
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "Europe/Lisbon"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
      - automated
    commit-message:
      prefix: chore(docker)

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "Europe/Lisbon"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
      - automated
    commit-message:
      prefix: chore(actions)