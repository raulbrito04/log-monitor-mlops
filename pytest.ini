[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    integration: tests that require a PostgreSQL test database
    slow: long-running stress or load validations
addopts =
    --cov=src
    --cov-report=term-missing
    --cov-report=html:reports/coverage_html
    --cov-fail-under=70
    -v
    --tb=short

[coverage:run]
omit =
    src/ml/train_model.py
    src/ml/feature_engineering.py
    src/ml/run_hybrid_pipeline.py
    src/ml/realtime_hybrid.py
    src/flask_app/traffic_generator.py
    src/dashboard/Home.py
    src/dashboard/pages/*